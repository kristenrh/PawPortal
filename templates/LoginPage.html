{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>PawPortal</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>
    <div class="navbar">
        <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            Shelter Dashboard
        </a>
    </div>

    <div class="content">
        <div class="dashboard-split">

            <section class="dash-intro">
                <h1 class="dash-title">Welcome to PawPortal!</h1>
                <p class="dash-subtitle">
                    A simple shelter management portal for tracking kennels, socialization, and adoptions.
                </p>

                <img src="static\css\background-Round.png" alt="PawPortal logo" class="login-logo">
            </section>

            <section class="dash-auth">
                <div class="auth-card">
                    <h2>Sign in</h2>
                    <p class="muted">Use your Google account to continue.</p>

                    <button class="google-btn" onclick="window.location.href='/login/'">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo">
                        Login with Google
                    </button>

                    <div class="auth-divider"></div>

                </div>
            </section>

        </div>
    </div>
</body>
</html>
