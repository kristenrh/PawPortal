{% extends "base.html" %}

{% block content %}

<div class="calendar-page">

    <div class="calendar-topbar">
        <div class="calendar-month-controls">
            <button id="prev-month" class="calendar-nav-btn" type="button">←</button>
            <h1 id="calendar-month" class="calendar-title">April 2026</h1>
            <button id="next-month" class="calendar-nav-btn" type="button">→</button>
        </div>

        <button class="calendar-event-btn calendar-create-btn" type="button" onclick="openAdoptionModal()">
            Create New Event
        </button>
    </div>

    <div class="calendar" id="calendar">
        <div class="calendar-header">Sunday</div>
        <div class="calendar-header">Monday</div>
        <div class="calendar-header">Tuesday</div>
        <div class="calendar-header">Wednesday</div>
        <div class="calendar-header">Thursday</div>
        <div class="calendar-header">Friday</div>
        <div class="calendar-header">Saturday</div>
    </div>
</div>

<div id="adoptionModal" class="social-modal">
    <div class="social-modal-card">
        <div class="modal-header">
            <h2>New Adoption Event</h2>
            <button class="modal-close" type="button" onclick="closeAdoptionModal()">×</button>
        </div>

        <!-- TODO DATABASE:
             Later, submit this form to Django using POST.
             Save animal, adopter, date, time, and notes to the adoption calendar table.
        -->
        <form>
            <label>Animal Name</label>
            <input id="eventAnimal" type="text" placeholder="Example: Luna">

            <label>Adopter Name</label>
            <input id="eventAdopter" type="text" placeholder="Example: Jane Smith">

            <label>Adoption Date</label>
            <input id="eventDate" type="date">

            <label>Adoption Time</label>
            <input id="eventTime" type="time">

            <label>Notes</label>
            <input id="eventNotes" type="text" placeholder="Optional notes">

            <button type="button" class="calendar-event-btn" onclick="saveAdoptionEvent()">
                Save Event
            </button>
        </form>
    </div>
</div>

<div id="dayEventsModal" class="social-modal">
    <div class="social-modal-card day-events-card">
        <div class="modal-header">
            <h2 id="dayEventsTitle">Events</h2>
            <button class="modal-close" type="button" onclick="closeDayEventsModal()">×</button>
        </div>

        <!-- TODO DATABASE:
             Later, load events for this date from the database.
             Save edited values with a Django POST/update view.
             Delete with a Django delete view after confirmation.
        -->
        <div id="dayEventsList"></div>

        <div class="modal-actions">
            <button type="button" class="calendar-event-btn" onclick="saveDayEventChanges()">
                Save Changes
            </button>

            <button type="button" class="calendar-cancel-btn" onclick="closeDayEventsModal()">
                Cancel
            </button>
        </div>
    </div>
</div>

<script>
    const calendar = document.getElementById("calendar");
    const monthLabel = document.getElementById("calendar-month");
    const prevBtn = document.getElementById("prev-month");
    const nextBtn = document.getElementById("next-month");

    let currentMonth = 3;
    let currentYear = 2026;
    let selectedDateKey = null;

    const monthNames = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
    ];

    // TODO DATABASE:
    // Later, replace this object with events passed from Django/database.
    const events = {
        "2026-04-03": [
            { animal: "Luna", adopter: "John", time: "10:00", notes: "" }
        ],
        "2026-04-06": [
            { animal: "Charlie", adopter: "Sarah", time: "13:30", notes: "" },
            { animal: "Milo", adopter: "Jamie", time: "15:00", notes: "" }
        ],
        "2026-04-10": [
            { animal: "Daisy", adopter: "", time: "11:00", notes: "" }
        ],
        "2026-04-20": [
            { animal: "Max", adopter: "Emily", time: "14:00", notes: "" }
        ]
    };

    function openAdoptionModal() {
        document.getElementById("adoptionModal").classList.add("show-modal");
    }

    function closeAdoptionModal() {
        document.getElementById("adoptionModal").classList.remove("show-modal");
    }

    function openDayEventsModal(dateKey) {
        selectedDateKey = dateKey;

        const list = document.getElementById("dayEventsList");
        const title = document.getElementById("dayEventsTitle");

        title.textContent = `Events for ${dateKey}`;
        list.innerHTML = "";

        const dayEvents = events[dateKey] || [];

        if (dayEvents.length === 0) {
            list.innerHTML = "<p class='muted'>No events for this day.</p>";
        } else {
            dayEvents.forEach((event, index) => {
                const item = document.createElement("div");
                item.classList.add("day-event-edit-card");

                item.innerHTML = `
                    <label>Animal Name</label>
                    <input class="edit-animal" type="text" value="${event.animal || ""}">

                    <label>Adopter Name</label>
                    <input class="edit-adopter" type="text" value="${event.adopter || ""}">

                    <label>Adoption Date</label>
                    <input class="edit-date" type="date" value="${dateKey}">

                    <label>Adoption Time</label>
                    <input class="edit-time" type="time" value="${event.time || ""}">

                    <label>Notes</label>
                    <input class="edit-notes" type="text" value="${event.notes || ""}">

                    <button class="trash-btn" type="button" onclick="deleteDayEvent(${index})">
                        🗑️ Delete Event
                    </button>
                `;

                list.appendChild(item);
            });
        }

        document.getElementById("dayEventsModal").classList.add("show-modal");
    }

    function closeDayEventsModal() {
        document.getElementById("dayEventsModal").classList.remove("show-modal");
        selectedDateKey = null;
    }

    function saveDayEventChanges() {
        if (!selectedDateKey) return;

        const cards = document.querySelectorAll(".day-event-edit-card");
        const updatedEventsByDate = {};

        cards.forEach(card => {
            const animal = card.querySelector(".edit-animal").value.trim();
            const adopter = card.querySelector(".edit-adopter").value.trim();
            const date = card.querySelector(".edit-date").value;
            const time = card.querySelector(".edit-time").value;
            const notes = card.querySelector(".edit-notes").value.trim();

            if (!animal || !date || !time) {
                return;
            }

            if (!updatedEventsByDate[date]) {
                updatedEventsByDate[date] = [];
            }

            updatedEventsByDate[date].push({
                animal: animal,
                adopter: adopter,
                time: time,
                notes: notes
            });
        });

        delete events[selectedDateKey];

        Object.keys(updatedEventsByDate).forEach(date => {
            if (!events[date]) {
                events[date] = [];
            }

            events[date] = events[date].concat(updatedEventsByDate[date]);
        });

        // TODO DATABASE:
        // Later, send updated event data to Django/database here.

        renderCalendar(currentMonth, currentYear);
        closeDayEventsModal();
    }

    function deleteDayEvent(index) {
        const confirmed = confirm("Are you sure you want to delete this adoption event?");

        if (!confirmed) {
            return;
        }

        events[selectedDateKey].splice(index, 1);

        if (events[selectedDateKey].length === 0) {
            delete events[selectedDateKey];
        }

        // TODO DATABASE:
        // Later, delete this specific event from the database here.

        renderCalendar(currentMonth, currentYear);
        openDayEventsModal(selectedDateKey);
    }

    function saveAdoptionEvent() {
        const animal = document.getElementById("eventAnimal").value;
        const adopter = document.getElementById("eventAdopter").value;
        const date = document.getElementById("eventDate").value;
        const timeValue = document.getElementById("eventTime").value;
        const notes = document.getElementById("eventNotes").value;

        if (!animal || !date || !timeValue) {
            alert("Please enter animal, date, and time.");
            return;
        }

        if (!events[date]) {
            events[date] = [];
        }

        events[date].push({
            animal: animal,
            adopter: adopter,
            time: timeValue,
            notes: notes
        });

        closeAdoptionModal();
        renderCalendar(currentMonth, currentYear);

        document.getElementById("eventAnimal").value = "";
        document.getElementById("eventAdopter").value = "";
        document.getElementById("eventDate").value = "";
        document.getElementById("eventTime").value = "";
        document.getElementById("eventNotes").value = "";
    }

    function formatEventText(event) {
        const timeParts = event.time.split(":");
        let hour = parseInt(timeParts[0]);
        const minute = timeParts[1];
        const ampm = hour >= 12 ? "PM" : "AM";

        hour = hour % 12;
        if (hour === 0) hour = 12;

        const formattedTime = `${hour}:${minute} ${ampm}`;

        return event.adopter
            ? `${formattedTime} - ${event.animal} (${event.adopter})`
            : `${formattedTime} - ${event.animal}`;
    }

    function renderCalendar(month, year) {
        const oldDays = calendar.querySelectorAll(".calendar-day");
        oldDays.forEach(day => day.remove());

        monthLabel.textContent = `${monthNames[month]} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const today = new Date();

        for (let i = 0; i < firstDay; i++) {
            const emptyCell = document.createElement("div");
            emptyCell.classList.add("calendar-day", "empty");
            calendar.appendChild(emptyCell);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const dayCell = document.createElement("div");
            dayCell.classList.add("calendar-day");

            const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

            dayCell.onclick = function () {
                openDayEventsModal(key);
            };

            if (
                day === today.getDate() &&
                month === today.getMonth() &&
                year === today.getFullYear()
            ) {
                dayCell.classList.add("today");
            }

            const dayNumber = document.createElement("div");
            dayNumber.classList.add("day-number");
            dayNumber.textContent = day;
            dayCell.appendChild(dayNumber);

            if (events[key]) {
                events[key].forEach(event => {
                    const eventDiv = document.createElement("div");
                    eventDiv.classList.add("calendar-event");
                    eventDiv.textContent = formatEventText(event);
                    dayCell.appendChild(eventDiv);
                });
            }

            calendar.appendChild(dayCell);
        }
    }

    prevBtn.addEventListener("click", () => {
        currentMonth--;
        if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
        }
        renderCalendar(currentMonth, currentYear);
    });

    nextBtn.addEventListener("click", () => {
        currentMonth++;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
        }
        renderCalendar(currentMonth, currentYear);
    });

    renderCalendar(currentMonth, currentYear);
</script>

<label for="animalSelect">Animal Name</label>
<select id="animalSelect" name="animalId">
    {% for animal in animals %}
        <option value="{{ animal.id }}">{{ animal.animalname }}</option>
    {% endfor %}
</select>

{% endblock %}
